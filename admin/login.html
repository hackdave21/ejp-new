<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | EJP</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1E3A5F',
                        accent: '#F5A623',
                        danger: '#C0392B',
                        dark: '#0F1B2D',
                        'admin-bg': '#1A2942',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'lock-close': 'lockClose 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'shake': 'shake 0.4s ease-in-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        lockClose: {
                            '0%': { transform: 'translateY(-10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-8px)' },
                            '75%': { transform: 'translateX(8px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #0F1B2D; min-height: 100vh; overflow: hidden; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .admin-card {
            background-color: #1A2942;
            border: 1px solid rgba(245, 166, 35, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .lockout-overlay {
            background: rgba(15, 27, 45, 0.9);
            backdrop-filter: blur(8px);
        }
        input:focus { border-color: #F5A623; outline: none; box-shadow: 0 0 0 2px rgba(245, 166, 35, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <canvas id="canvas"></canvas>

    <div class="relative z-10 w-full max-w-md animate-fade-in">
        <!-- Badge -->
        <div class="flex justify-center mb-6">
            <span class="bg-danger/20 text-danger border border-danger/30 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                <i class="fas fa-lock"></i> Espace Administrateur
            </span>
        </div>

        <!-- Login Card -->
        <div id="login-card" class="admin-card rounded-3xl p-8 lg:p-12 relative overflow-hidden">
            
            <!-- Lockout State (Hidden by default) -->
            <div id="lockout-view" class="lockout-overlay absolute inset-0 z-50 flex flex-col items-center justify-center text-center p-8 hidden">
                <div class="w-20 h-20 bg-danger/20 rounded-full flex items-center justify-center text-danger text-4xl mb-6 animate-lock-close">
                    <i class="fas fa-user-lock"></i>
                </div>
                <h2 class="text-white text-2xl font-serif mb-2">Accès Verrouillé</h2>
                <p class="text-white/60 text-sm mb-6">Trop de tentatives échouées. Veuillez patienter.</p>
                <div class="text-4xl font-mono text-accent font-bold" id="timer">00:30</div>
            </div>

            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-dark border border-accent/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <span class="text-accent text-2xl font-serif font-bold">EJP</span>
                </div>
                <h1 class="text-white text-2xl font-serif">Connexion</h1>
                <p class="text-white/40 text-sm mt-1">Identifiez-vous pour gérer la plateforme</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Identifiant Admin</label>
                    <div class="relative">
                        <i class="fas fa-shield-alt absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
                        <input type="text" id="admin-id" placeholder="Ex: admin_ejp" class="w-full bg-dark/50 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder-white/10 transition-all">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Mot de passe</label>
                    <div class="relative">
                        <i class="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-white/20"></i>
                        <input type="password" id="admin-password" placeholder="••••••••" class="w-full bg-dark/50 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder-white/10 transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-danger hover:bg-danger/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-danger/20 mt-8 active:scale-95">
                    Accéder au Dashboard
                </button>
            </form>

            <div class="mt-10 pt-6 border-t border-white/5 text-center">
                <p class="text-[10px] text-white/20 uppercase tracking-[0.2em]">Accès réservé à l'administration de l'EJP</p>
            </div>
        </div>
    </div>

    <script>
        // --- Particle Background ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(245, 166, 35, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        createParticles();
        animate();

        // --- Login Logic ---
        const form = document.getElementById('login-form');
        const card = document.getElementById('login-card');
        const lockoutView = document.getElementById('lockout-view');
        const timerEl = document.getElementById('timer');
        
        let attempts = 0;
        let isLocked = false;

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (isLocked) return;

            const id = document.getElementById('admin-id').value;
            const pw = document.getElementById('admin-password').value;

            // Simple validation for demo
            if (id === 'admin' && pw === 'admin2026') {
                window.location.href = 'dashboard.html';
            } else {
                attempts++;
                shakeCard();
                
                if (attempts >= 3) {
                    startLockout();
                }
            }
        });

        function shakeCard() {
            card.classList.add('animate-shake');
            setTimeout(() => card.classList.remove('animate-shake'), 400);
        }

        function startLockout() {
            isLocked = true;
            lockoutView.classList.remove('hidden');
            let timeLeft = 30;
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerEl.textContent = `00:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    unlock();
                }
            }, 1000);
        }

        function unlock() {
            isLocked = false;
            attempts = 0;
            lockoutView.classList.add('hidden');
            timerEl.textContent = "00:30";
        }
    </script>
</body>
</html>
